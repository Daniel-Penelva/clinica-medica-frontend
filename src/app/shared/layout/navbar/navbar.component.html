<mat-toolbar color="primary" class="navbar">
  <!-- Botao hamburguer para abrir/fechar sidebar -->
  <button mat-icon-button (click)="onToggle()" aria-label="Menu">
    <mat-icon>menu</mat-icon>
  </button>

  <!-- Nome do sistema -->
  <span class="app-title">Clínica Médica</span>

  <!-- Espaçador flexivel: empurra o menu de usuario para a direita -->
  <span class="spacer"></span>

  <!-- Menu do usuario -->
  <button mat-button [matMenuTriggerFor]="menuUsuario" class="user-button">
    <mat-icon>account_circle</mat-icon>
    <span class="user-email">{{ authService.getEmail() }}</span>
    <mat-icon>arrow_drop_down</mat-icon>
  </button>

  <mat-menu #menuUsuario="matMenu">
    <div class="menu-header">
      <span>{{ authService.currentRole() }}</span>
    </div>
    <mat-divider />
    <button mat-menu-item (click)="onLogout()">
      <mat-icon>logout</mat-icon>
      <span>Sair</span>
    </button>
  </mat-menu>
</mat-toolbar>
